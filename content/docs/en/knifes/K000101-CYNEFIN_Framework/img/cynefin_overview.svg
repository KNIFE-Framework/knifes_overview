<svg width="100%" viewBox="0 0 760 500" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#736e6c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Clear (top-left): x=20..280, y=20..190 -->
<g>
<rect x="20" y="20" width="260" height="170" rx="12" fill="#f1efe8" stroke="#5f5e5a" stroke-width="0.5"/>
<text x="150" y="55" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#444441">Clear (obvious)</text>
<text x="150" y="88" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#5f5e5a">Cause-effect is clear</text>
<text x="150" y="110" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#5f5e5a">Best practices apply</text>
<text x="150" y="140" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#5f5e5a">Sense → Categorize → Respond</text>
<text x="150" y="163" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#5f5e5a">Example: routine support ticket</text>
</g>

<!-- Complicated (top-right): x=480..740, y=20..190 -->
<g>
<rect x="480" y="20" width="260" height="170" rx="12" fill="#e1f5ee" stroke="#0f6e56" stroke-width="0.5"/>
<text x="610" y="55" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#085041">Complicated</text>
<text x="610" y="88" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#0f6e56">Expertise required</text>
<text x="610" y="110" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#0f6e56">Good practices, multiple solutions</text>
<text x="610" y="140" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#0f6e56">Sense → Analyze → Respond</text>
<text x="610" y="163" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#0f6e56">Example: jet engine</text>
</g>

<!-- Complex (bottom-left): x=20..280, y=310..480 -->
<g>
<rect x="20" y="310" width="260" height="170" rx="12" fill="#eeedfe" stroke="#534ab7" stroke-width="0.5"/>
<text x="150" y="345" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#3c3489">Complex</text>
<text x="150" y="378" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#534ab7">Patterns emerge over time</text>
<text x="150" y="400" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#534ab7">Emergent behaviour</text>
<text x="150" y="430" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#534ab7">Probe → Sense → Respond</text>
<text x="150" y="453" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#534ab7">Example: startup, software</text>
</g>

<!-- Chaotic (bottom-right): x=480..740, y=310..480 -->
<g>
<rect x="480" y="310" width="260" height="170" rx="12" fill="#faece7" stroke="#993c1d" stroke-width="0.5"/>
<text x="610" y="345" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#712b13">Chaotic</text>
<text x="610" y="378" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#993c1d">No patterns, urgency</text>
<text x="610" y="400" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#993c1d">Immediate action required</text>
<text x="610" y="430" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#993c1d">Act → Sense → Respond</text>
<text x="610" y="453" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#993c1d">Example: system outage</text>
</g>

<!-- Disorder (center): x=310..450, y=224..276 — 30px clearance from all boxes -->
<g>
<rect x="310" y="224" width="140" height="52" rx="26" fill="#faeeda" stroke="#854f0b" stroke-width="0.8"/>
<text x="380" y="250" text-anchor="middle" dominant-baseline="central" font-family="-apple-system,'Segoe UI',sans-serif" font-size="14" font-weight="500" fill="#633806">Disorder</text>
</g>

<!-- Arrows from Disorder: to Clear (left), to Complicated (right), to Complex (down-left diagonal) — no arrow toward Chaotic -->
<line x1="355" y1="248" x2="283" y2="248" marker-end="url(#arrow)" stroke-dasharray="5 3" stroke="#736e6c" stroke-width="1.5" fill="none"/>
<line x1="405" y1="240" x2="477" y2="210" marker-end="url(#arrow)" stroke-dasharray="5 3" stroke="#736e6c" stroke-width="1.5" fill="none"/>
<line x1="345" y1="265" x2="283" y2="307" marker-end="url(#arrow)" stroke-dasharray="5 3" stroke="#736e6c" stroke-width="1.5" fill="none"/>

<text x="380" y="494" text-anchor="middle" font-family="-apple-system,'Segoe UI',sans-serif" font-size="12" fill="#3d3d3a">Cynefin Framework – 5 domains for sense-making</text>
</svg>
